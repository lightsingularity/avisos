name: Scrape diario de bienes raíces

on:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC = 07:00 en Monterrey (UTC-6 todo el año)
  workflow_dispatch:        # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr scraper
        run: python -m scraper

      - name: Confirmar datos nuevos
        run: |
          git config user.name "scraper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/eventos
          if git diff --cached --quiet; then
            echo "Sin cambios que confirmar."
          else
            FECHA=$(date -u +%F)
            git commit -m "datos ${FECHA}"
            git push
          fi
