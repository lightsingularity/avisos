name: Calibración (manual)

on:
  workflow_dispatch:   # se ejecuta a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  calibrar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr calibración
        run: python calibrate.py   # imprime hallazgos al log y guarda fixtures

      - name: Guardar fixtures capturados
        run: |
          git config user.name "scraper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add tests/fixtures
          if git diff --cached --quiet; then
            echo "Sin fixtures nuevos."
          else
            git commit -m "calibración: fixtures de detalle e índice"
            git push
          fi
